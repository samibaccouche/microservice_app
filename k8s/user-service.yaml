apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: micro-app # On isole tout dans ce namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: samibaccouche/user-service:latest # Ton image Docker Hub
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: micro-app
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
