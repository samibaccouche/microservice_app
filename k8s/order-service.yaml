apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: micro-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: samibaccouche9981/order-service:latest
        ports:
        - containerPort: 8083
        env:
        - name: MONGO_URI
          value: "mongodb://mongo-order:27017/"
---
apiVersion: v1
kind: Service
metadata:
  name: goapp-order
  namespace: micro-app
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8083
