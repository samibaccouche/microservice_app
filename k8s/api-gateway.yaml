apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: micro-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: samibaccouche9981/api-gateway:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: micro-app
spec:
  type: LoadBalancer # Très important : Azure va créer une IP publique ici
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
