apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-user
  namespace: micro-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-user
  template:
    metadata:
      labels:
        app: mongo-user
    spec:
      containers:
      - name: mongo-user
        image: mongo:4.4
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-user # Ce nom doit être identique à celui dans ta MONGO_URI
  namespace: micro-app
spec:
  selector:
    app: mongo-user
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
