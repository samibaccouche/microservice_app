name: CI/CD Pipeline

on: 
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        services: [cart-service, user-service, order-service, payment-service, product-service, notification-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Go Vet & Test
        run: |
         cd ${{ matrix.service }} 
         go vet ./...
         go test -v ./...

  validate-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Nginx Config
        uses: citrus360/nginx-check-action@v1.1
        with:
          conf_file './nginx.conf'
