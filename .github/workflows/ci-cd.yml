name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [cart-service, user-service, order-service, payment-service, product-service, notification-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Go Vet & Test
        run: |
          cd ${{ matrix.service }}
          [ -f go.mod ] || go mod init github.com/samibaccouche/${{ matrix.service }}
          go mod tidy
          go test -v ./...
  validate-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Nginx Config
        run: |
          # On nettoie le fichier pour le test de syntaxe
          sed -i '/upstream/,/}/d' nginx.conf 
          sed -i 's/proxy_pass http:\/\/.*;/proxy_pass http:\/\/localhost;/g' nginx.conf
          docker run --rm -v $(pwd)/nginx.conf:/etc/nginx/nginx.conf:ro nginx:alpine nginx -t
  sonarqube-analysis:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Important pour que Sonar puisse analyser l'historique git

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
        with:
          args: >
            -Dsonar.projectKey=samibaccouche_microservice_app
            -Dsonar.organization=samibaccouche
            -Dsonar.sources=.
  build-and-push-microservices:
      runs-on: ubuntu-latest
      needs: [sonarqube-analysis] # On attend que Sonar donne son feu vert
      strategy:
        matrix:
        # Liste de tes dossiers de services (vérifie bien l'orthographe)
          service: [cart-service, user-service, order-service, payment-service, product-service, notification-service]
    
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build and push
          uses: docker/build-push-action@v5
          with:
          # On se place dans le dossier du microservice (ex: ./cart-service)
            context: ./${{ matrix.service }}
            push: true
          # Remplace 'ton-user-docker' par ton vrai pseudo Docker Hub
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}



  build-and-push-gateway:
      runs-on: ubuntu-latest
      needs: [validate-gateway] # On attend que le test de syntaxe Nginx soit OK
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build and push Gateway
          uses: docker/build-push-action@v5
          with:
            context: .
            file: ./Dockerfile.gateway # On précise bien quel Dockerfile utiliser
            push: true
            tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ github.sha }}
  deploy-to-aks:
      runs-on: ubuntu-latest
      needs: [build-and-push-microservices, build-and-push-gateway] # S'assure que les images sont prêtes avant
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set Kubernetes Context
          uses: azure/k8s-set-context@v3
          with:
            method: kubeconfig
            kubeconfig: ${{ secrets.KUBE_CONFIG }}

      #  - name: Deploy to AKS
        #  run: |
          # 1. Créer le namespace s'il n'existe pas
         #   kubectl create namespace micro-app --dry-run=client -o yaml | kubectl apply -f -
          
          # 2. Appliquer tous tes fichiers YAML (assure-toi d'avoir un dossier k8s/)
          #  kubectl apply -f k8s/ -n micro-app
          # waiting for the helm and k8s manifest
  deploy-to-aks:
      runs-on: ubuntu-latest
    # On attend que TOUTES les images (microservices + gateway) soient sur le Docker Hub
      needs: [build-and-push-microservices, build-and-push-gateway] 
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set Kubernetes Context
          uses: azure/k8s-set-context@v3
          with:
            method: kubeconfig
            kubeconfig: ${{ secrets.KUBE_CONFIG }}

        - name: Create Namespace
          run: |
            kubectl create namespace micro-app --dry-run=client -o yaml | kubectl apply -f -

        - name: Update and Deploy Manifests
          run: |
          # Cette commande remplace le tag 'latest' par le tag précis du commit actuel ${{ github.sha }}
          # dans tous les fichiers du dossier k8s/ avant de les appliquer.
          # C'est la méthode "Clean" pour forcer Kubernetes à mettre à jour les pods.
          
            sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/\(.*\):latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/\1:${{ github.sha }}|g" k8s/*.yaml
          
            kubectl apply -f k8s/ -n micro-app
          
        - name: Verify Deployment
          run: |
            kubectl get pods -n micro-app
            kubectl get svc -n micro-app
